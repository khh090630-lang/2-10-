<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 익명 게시판</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f4f7f6; --text-color: #333; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-color); }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 20px; }
        .write-btn { padding: 8px 16px; background: var(--primary-color); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        .post-item { border-bottom: 1px solid #eee; }
        .post-title-box { padding: 15px 5px; cursor: pointer; display: flex; flex-direction: column; }
        .post-title-box:hover { background: #fafafa; }
        .post-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        .post-date { font-size: 12px; color: #999; }
        
        .post-content-box { display: none; padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 15px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
        
        /* 수정 삭제 버튼 스타일 */
        .action-buttons { margin-top: 15px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px dashed #ccc; padding-top: 10px; }
        .btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-edit { background-color: #f0ad4e; color: white; }
        .btn-delete { background-color: #d9534f; color: white; }

        #write-view { display: none; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; }
        .button-group { display: flex; gap: 10px; }
        .submit-btn { flex: 2; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .cancel-btn { flex: 1; padding: 15px; background: #e0e0e0; color: #555; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .loading { text-align: center; padding: 30px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div id="list-view">
        <div class="header">
            <h2>🏫 학급 익명 게시판</h2>
            <button class="write-btn" onclick="openWriteForm()">✍️ 글 작성</button>
        </div>
        <div id="posts-list"><div class="loading">게시글을 불러오는 중...</div></div>
    </div>

    <div id="write-view">
        <div class="header"><h2 id="form-title">새 글 작성하기</h2></div>
        <input type="text" id="title" placeholder="제목을 입력하세요">
        <textarea id="content" rows="6" placeholder="내용을 입력하세요"></textarea>
        <input type="password" id="password" placeholder="비밀번호 4자리 (수정/삭제 시 필요)">
        
        <div class="button-group">
            <button class="cancel-btn" onclick="toggleScreen('list')">취소</button>
            <button class="submit-btn" onclick="submitPost()" id="submit-btn">게시하기</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw38RT0MVkzhkuiCUqrWiilPfwEZdBrh65orlmbn-tJYgJQG71KSGL2uB9GTJC7I1p8QQ/exec";

    let currentMode = 'write'; 
    let currentEditId = null;

    function toggleScreen(screen) {
        if (screen === 'write') {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('write-view').style.display = 'block';
        } else {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('write-view').style.display = 'none';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('password').value = '';
        }
    }

    function openWriteForm() {
        currentMode = 'write';
        currentEditId = null;
        document.getElementById('form-title').innerText = "새 글 작성하기";
        document.getElementById('submit-btn').innerText = "게시하기";
        toggleScreen('write');
    }

    function toggleContent(element) {
        const contentBox = element.nextElementSibling;
        contentBox.style.display = (contentBox.style.display === "block") ? "none" : "block";
    }

    // 🌟 어떤 형태의 데이터가 들어와도 완벽하게 처리하는 마법의 함수
    async function loadPosts() {
        const list = document.getElementById('posts-list');
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (!data || data.length === 0) {
                list.innerHTML = "<div class='loading'>아직 등록된 글이 없습니다.</div>";
                return;
            }

            list.innerHTML = data.reverse().map(post => {
                // 서버가 객체로 주든, 배열로 주든 무조건 찾아냅니다.
                const rawId = post.id || post[0];
                const safeTitle = String(post.title || post[1] || '제목 없음');
                const safeContent = String(post.content || post[2] || '내용 없음');

                // 1970년 에러를 막는 핵심 날짜 변환기
                let displayDate = "";
                if (!rawId) {
                    displayDate = "날짜 표기 불가 (고유ID 없음)";
                } else if (isNaN(Number(rawId))) {
                    displayDate = new Date(rawId).toLocaleString('ko-KR'); // 시트에 적힌 글자 그대로의 날짜일 경우
                } else {
                    displayDate = new Date(Number(rawId)).toLocaleString('ko-KR'); // 정상적인 고유 숫자일 경우
                }

                const escapedTitle = safeTitle.replace(/'/g, "\\'");
                const escapedContent = safeContent.replace(/'/g, "\\'").replace(/\n/g, "\\n");

                return `
                <div class="post-item">
                    <div class="post-title-box" onclick="toggleContent(this)">
                        <div class="post-title">${safeTitle}</div>
                        <div class="post-date">${displayDate}</div>
                    </div>
                    <div class="post-content-box">
                        <div>${safeContent}</div>
                        <div class="action-buttons">
                            <button class="btn-small btn-edit" onclick="openEditForm('${rawId}', '${escapedTitle}', '${escapedContent}')">수정</button>
                            <button class="btn-small btn-delete" onclick="deletePost('${rawId}')">삭제</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        } catch (e) {
            list.innerHTML = `<div class='loading'>데이터를 불러올 수 없습니다.</div>`;
        }
    }

    async function submitPost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');

        if (!title.trim() || !content.trim() || !password.trim()) {
            alert("제목, 내용, 비밀번호를 모두 입력해주세요!");
            return;
        }

        btn.innerText = "처리 중...";
        btn.disabled = true;

        const payload = { action: currentMode, title, content, password };
        if (currentMode === 'edit') payload.id = currentEditId;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(payload)
            });
            const result = await response.json();

            if (result.result === 'success') {
                alert(currentMode === 'edit' ? "수정되었습니다!" : "게시되었습니다!");
                toggleScreen('list');
                document.getElementById('posts-list').innerHTML = "<div class='loading'>새로고침 중...</div>";
                loadPosts(); 
            } else {
                alert("오류: " + result.message); 
            }
        } catch (e) {
            alert("서버 통신 중 에러가 발생했습니다.");
        } finally {
            btn.innerText = currentMode === 'edit' ? "수정하기" : "게시하기";
            btn.disabled = false;
        }
    }

    function openEditForm(id, title, content) {
        if (!id || id === 'undefined') {
            alert("이전 테스트 게시물은 웹에서 수정할 수 없습니다. 시트에서 직접 지워주세요.");
            return;
        }
        currentMode = 'edit';
        currentEditId = id;
        document.getElementById('title').value = title;
        document.getElementById('content').value = content;
        document.getElementById('password').value = '';
        document.getElementById('form-title').innerText = "글 수정하기";
        document.getElementById('submit-btn').innerText = "수정하기";
        toggleScreen('write');
    }

    async function deletePost(id) {
        // ID가 아예 없는 유령 게시글 방어 
        if (!id || id === 'undefined') {
            alert("오래된 테스트 게시물은 고유 번호가 없어 웹에서 삭제할 수 없습니다. 스프레드시트에서 직접 행을 삭제해주세요.");
            return;
        }

        const password = prompt("게시글을 삭제하려면 비밀번호를 입력하세요:");
        if (!password) return;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify({ action: 'delete', id: id, password: password })
            });
            const result = await response.json();

            if (result.result === 'success') {
                alert("삭제되었습니다.");
                document.getElementById('posts-list').innerHTML = "<div class='loading'>새로고침 중...</div>";
                loadPosts();
            } else {
                alert("삭제 실패: " + result.message);
            }
        } catch (e) {
            alert("서버 통신 중 에러가 발생했습니다.");
        }
    }

    window.onload = loadPosts;
</script>

</body>
</html>
