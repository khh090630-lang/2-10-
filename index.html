<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 익명 게시판</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f4f7f6; --text-color: #333; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-color); }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 20px; }
        .write-btn { padding: 8px 16px; background: var(--primary-color); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        .post-item { border-bottom: 1px solid #eee; }
        .post-title-box { padding: 15px 5px; cursor: pointer; display: flex; flex-direction: column; }
        .post-title-box:hover { background: #fafafa; }
        .post-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        .post-date { font-size: 12px; color: #999; }
        
        /* 게시물 내용 (기본은 숨김, 자바스크립트로 제어) */
        .post-content-box { display: none; padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 15px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
        
        .action-buttons { margin-top: 15px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px dashed #ccc; padding-top: 10px; margin-bottom: 15px; }
        .btn-small { padding: 6px 10px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-edit { background-color: #f0ad4e; }
        .btn-delete { background-color: #d9534f; }
        .btn-reply { background-color: #5bc0de; }

        /* 댓글 영역 스타일 */
        .comments-section { border-top: 2px solid #ddd; padding-top: 15px; }
        .comment-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .comment-reply { margin-left: 20px; border-left: 3px solid #ccc; padding-left: 10px; background-color: #f1f1f1; border-radius: 0 8px 8px 0; }
        .comment-date { font-size: 11px; color: #888; margin-bottom: 4px; }
        .comment-content { margin-bottom: 8px; }
        .comment-actions { display: flex; gap: 5px; justify-content: flex-end; }
        
        /* 🌟 전체 화면 로딩 오버레이 (다중 클릭 완벽 차단) */
        #global-loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 9999; flex-direction: column; 
            justify-content: center; align-items: center; color: white; font-weight: bold; 
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 모달 팝업 스타일 */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        #comment-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #comment-modal h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; }

        #write-view { display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        .submit-btn { flex: 2; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cancel-btn { flex: 1; padding: 12px; background: #e0e0e0; color: #555; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="global-loader">
    <div class="spinner"></div>
    <div>데이터 처리 중입니다...</div>
</div>

<div class="container">
    <div id="list-view">
        <div class="header">
            <h2>🏫 학급 익명 게시판</h2>
            <button class="write-btn" onclick="openWriteForm()">✍️ 글 작성</button>
        </div>
        <div id="posts-list"><div style="text-align: center; padding: 30px; color: #888;">게시판을 불러오는 중...</div></div>
    </div>

    <div id="write-view">
        <div class="header"><h2 id="form-title">새 글 작성하기</h2></div>
        <input type="text" id="title" placeholder="제목을 입력하세요">
        <textarea id="content" rows="6" placeholder="내용을 입력하세요"></textarea>
        <input type="password" id="password" placeholder="비밀번호 4자리 (수정/삭제 시 필요)">
        
        <div class="button-group">
            <button class="cancel-btn" onclick="toggleScreen('list')">취소</button>
            <button class="submit-btn" onclick="submitPost()">게시하기</button>
        </div>
    </div>
</div>

<div id="modal-overlay" onclick="closeCommentModal()"></div>
<div id="comment-modal">
    <h3 id="c-modal-title">댓글 작성</h3>
    <textarea id="c-modal-content" rows="3" placeholder="내용을 입력하세요"></textarea>
    <input type="password" id="c-modal-pw" placeholder="비밀번호 (수정/삭제 시 필요)">
    <div class="button-group">
        <button class="cancel-btn" onclick="closeCommentModal()">취소</button>
        <button class="submit-btn" id="c-modal-submit">확인</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw38RT0MVkzhkuiCUqrWiilPfwEZdBrh65orlmbn-tJYgJQG71KSGL2uB9GTJC7I1p8QQ/exec";

    let currentMode = 'write'; 
    let currentEditId = null;
    
    // 🌟 열려있는 게시물의 ID를 기억하는 메모리 장치
    let openPostIds = new Set();

    // 로딩 화면 제어 함수
    function showLoader() { document.getElementById('global-loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('global-loader').style.display = 'none'; }

    function toggleScreen(screen) {
        if (screen === 'write') {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('write-view').style.display = 'block';
        } else {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('write-view').style.display = 'none';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('password').value = '';
        }
    }

    function openWriteForm() {
        currentMode = 'write';
        currentEditId = null;
        document.getElementById('form-title').innerText = "새 글 작성하기";
        toggleScreen('write');
    }

    // 🌟 아코디언 창을 열 때 번호를 기억하고, 닫을 때 지웁니다.
    function toggleContent(element, postId) {
        const contentBox = element.nextElementSibling;
        if (contentBox.style.display === "block") {
            contentBox.style.display = "none";
            openPostIds.delete(postId); // 닫으면 메모리에서 삭제
        } else {
            contentBox.style.display = "block";
            openPostIds.add(postId);    // 열면 메모리에 추가
        }
    }

    async function loadPosts() {
        const list = document.getElementById('posts-list');
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (!data.posts || data.posts.length === 0) {
                list.innerHTML = "<div style='text-align: center; padding: 30px; color: #888;'>아직 등록된 글이 없습니다.</div>";
                return;
            }

            list.innerHTML = data.posts.reverse().map(post => {
                const safeTitle = String(post.title).replace(/'/g, "\\'");
                const safeContent = String(post.content).replace(/'/g, "\\'").replace(/\n/g, "\\n");

                // 댓글 필터링 (동일)
                const postComments = data.comments.filter(c => c.postId === post.id);
                const topLevelComments = postComments.filter(c => !c.parentId); 
                
                let commentsHTML = `<div class="comments-section">
                    <div style="font-weight:bold; margin-bottom:10px; font-size:14px;">💬 댓글 ${postComments.length}개</div>`;

                topLevelComments.forEach(c => {
                    const escContent = String(c.content).replace(/'/g, "\\'").replace(/\n/g, "\\n");
                    commentsHTML += `
                    <div class="comment-item">
                        <div class="comment-date">${c.commentId}</div>
                        <div class="comment-content">${c.content}</div>
                        <div class="comment-actions">
                            <button class="btn-small btn-reply" onclick="openCommentModal('write_reply', '${post.id}', '${c.commentId}')">답글</button>
                            <button class="btn-small btn-edit" onclick="openCommentModal('edit', null, '${c.commentId}', '${escContent}')">수정</button>
                            <button class="btn-small btn-delete" onclick="deleteComment('${c.commentId}')">삭제</button>
                        </div>
                    </div>`;

                    const replies = postComments.filter(reply => reply.parentId === c.commentId);
                    replies.forEach(r => {
                        const escReply = String(r.content).replace(/'/g, "\\'").replace(/\n/g, "\\n");
                        commentsHTML += `
                        <div class="comment-item comment-reply">
                            <div class="comment-date">↳ ${r.commentId}</div>
                            <div class="comment-content">${r.content}</div>
                            <div class="comment-actions">
                                <button class="btn-small btn-edit" onclick="openCommentModal('edit', null, '${r.commentId}', '${escReply}')">수정</button>
                                <button class="btn-small btn-delete" onclick="deleteComment('${r.commentId}')">삭제</button>
                            </div>
                        </div>`;
                    });
                });

                commentsHTML += `
                    <button class="btn-small" style="width:100%; margin-top:10px; background:#4a90e2;" onclick="openCommentModal('write', '${post.id}')">✏️ 새 댓글 달기</button>
                </div>`;

                // 🌟 게시글이 메모리(openPostIds)에 있으면 display: block으로 열어둡니다.
                const isOpen = openPostIds.has(post.id) ? "display: block;" : "display: none;";

                return `
                <div class="post-item">
                    <div class="post-title-box" onclick="toggleContent(this, '${post.id}')">
                        <div class="post-title">${post.title}</div>
                        <div class="post-date">${post.id}</div>
                    </div>
                    <div class="post-content-box" style="${isOpen}">
                        <div>${post.content}</div>
                        <div class="action-buttons">
                            <button class="btn-small btn-edit" onclick="openEditForm('${post.id}', '${safeTitle}', '${safeContent}')">글 수정</button>
                            <button class="btn-small btn-delete" onclick="deletePost('${post.id}')">글 삭제</button>
                        </div>
                        ${commentsHTML}
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            list.innerHTML = `<div style='text-align: center; padding: 30px; color: red;'>데이터를 불러올 수 없습니다.</div>`;
        }
    }

    // ==========================================
    // 게시글 통신 함수 (로딩 애니메이션 적용)
    // ==========================================
    async function submitPost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const password = document.getElementById('password').value;

        if (!title.trim() || !content.trim() || !password.trim()) { alert("모두 입력해주세요!"); return; }

        showLoader(); // 로딩 시작! (버튼 조작 불가)
        const payload = { action: currentMode, title, content, password, id: currentEditId };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.result === 'success') {
                alert("완료되었습니다!");
                toggleScreen('list');
                await loadPosts(); 
            } else alert("오류: " + result.message); 
        } catch (e) { alert("서버 통신 에러!"); } 
        finally { hideLoader(); } // 성공이든 에러든 무조건 로딩 끝!
    }

    function openEditForm(id, title, content) {
        currentMode = 'edit'; currentEditId = id;
        document.getElementById('title').value = title;
        document.getElementById('content').value = content;
        document.getElementById('password').value = '';
        document.getElementById('form-title').innerText = "글 수정하기";
        toggleScreen('write');
    }

    async function deletePost(id) {
        const password = prompt("게시글을 삭제하려면 비밀번호를 입력하세요:");
        if (!password) return;
        
        showLoader(); // 로딩 시작
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'delete', id: id, password: password }) });
            const result = await res.json();
            if (result.result === 'success') { 
                alert("게시글과 댓글이 모두 삭제되었습니다."); 
                openPostIds.delete(id); // 삭제된 글은 메모리에서도 지웁니다.
                await loadPosts(); 
            } else alert("삭제 실패: " + result.message);
        } catch (e) { alert("에러 발생!"); }
        finally { hideLoader(); } // 로딩 끝
    }

    // ==========================================
    // 댓글/대댓글 통신 함수 (로딩 애니메이션 적용)
    // ==========================================
    let modalAction = '';
    let targetPostId = '';
    let targetCommentId = '';

    function openCommentModal(action, postId = null, commentId = null, content = '') {
        modalAction = action; targetPostId = postId; targetCommentId = commentId;
        
        document.getElementById('c-modal-content').value = content;
        document.getElementById('c-modal-pw').value = '';
        
        const titleEl = document.getElementById('c-modal-title');
        if(action === 'write') titleEl.innerText = '새 댓글 달기';
        else if(action === 'write_reply') titleEl.innerText = '대댓글(답글) 달기';
        else if(action === 'edit') titleEl.innerText = '댓글 수정하기';

        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('comment-modal').style.display = 'block';
        document.getElementById('c-modal-submit').onclick = submitComment;
    }

    function closeCommentModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('comment-modal').style.display = 'none';
    }

    async function submitComment() {
        const content = document.getElementById('c-modal-content').value;
        const password = document.getElementById('c-modal-pw').value;
        if(!content.trim() || !password.trim()) { alert("내용과 비밀번호를 입력하세요."); return; }

        let payload = { password: password, content: content };
        
        if (modalAction === 'write') {
            payload.action = 'write_comment'; payload.postId = targetPostId;
        } else if (modalAction === 'write_reply') {
            payload.action = 'write_comment'; payload.postId = targetPostId; payload.parentId = targetCommentId;
        } else if (modalAction === 'edit') {
            payload.action = 'edit_comment'; payload.commentId = targetCommentId;
        }

        closeCommentModal();
        showLoader(); // 로딩 시작!

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.result === 'success') { await loadPosts(); } 
            else alert("오류: " + result.message);
        } catch (e) { alert("에러 발생!"); }
        finally { hideLoader(); } // 로딩 끝!
    }

    async function deleteComment(commentId) {
        const password = prompt("댓글을 삭제하려면 비밀번호를 입력하세요:");
        if (!password) return;
        
        showLoader(); // 로딩 시작!
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'delete_comment', commentId: commentId, password: password }) });
            const result = await res.json();
            if (result.result === 'success') { await loadPosts(); } 
            else alert("삭제 실패: " + result.message);
        } catch (e) { alert("에러 발생!"); }
        finally { hideLoader(); } // 로딩 끝!
    }

    window.onload = loadPosts;
</script>

</body>
</html>
